# NOTE: Visual general settings (gaps, borders, layout) are in ui.conf
general {
    allow_tearing = true

    snap {
        enabled = true
        window_gap = 10
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    focus_on_activate = true
    # DPMS wake is handled by hypridle
}

cursor {
    hide_on_key_press = true
    inactive_timeout = 5
}

xwayland {
    force_zero_scaling = true
}


