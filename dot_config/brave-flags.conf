# Brave/Chromium 143+ - AMD RX 7900 GRE optimizado
# Actualizado: 2025-12-18

# Forzar Wayland SIN fallback. El "-hint" caía silenciosamente a X11 si el socket
# Wayland no estaba listo al arrancar (post boot/resume). Sin "hint" no hay fallback.
--ozone-platform=wayland

# VA-API + Vulkan (óptimo para AMD en Wayland)
--enable-features=VaapiVideoDecoder,VaapiIgnoreDriverChecks,Vulkan,DefaultANGLEVulkan,VulkanFromANGLE

# GPU acceleration
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-zero-copy
