[General]
# DisplayServer=wayland  ← causaba HELPER_DISPLAYSERVER_ERROR + logout a los 90s
# (el greeter wayland fallaba y el fallback dejaba a SDDM en estado inconsistente;
#  la sesion Hyprland sigue siendo Wayland, esto SOLO afecta el greeter/login)
DisplayServer=x11
DefaultSession=hyprland.desktop

[Wayland]
EnableHiDPI=true
SessionDir=/usr/share/wayland-sessions
